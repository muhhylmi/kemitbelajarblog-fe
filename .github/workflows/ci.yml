name: CI/CD

on:
  push:
    branches: ['master']
  pull_request:
    branches: ['master']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install & Lint & Build
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Deploy to server via SSH
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        env:
          SSH_HOST: ${{ secrets.SERVER_HOST }}
          SSH_USER: ${{ secrets.SERVER_USER }}
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SSH_PORT: ${{ secrets.SERVER_SSH_PORT || '22' }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519_gh
          chmod 600 ~/.ssh/id_ed25519_gh
          ssh-keyscan -p $SSH_PORT $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ed25519_gh -p $SSH_PORT -o StrictHostKeyChecking=no \
            "${SSH_USER}@${SSH_HOST}" \
            "cd ~/repositories/kemitbelajarblog-fe && \
             git pull origin master && \
             npm ci && \
             npm run build && \
             export PATH=\$PATH:/home/ubuntu/.npm-global/bin && \
             pm2 restart kemitbelajarblog-fe --update-env"
